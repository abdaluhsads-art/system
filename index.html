<style>

<body>
<div id="app">
  <div id="content"><div class="loading">جارِ التحميل...</div></div>
  <div id="bottomnav" style="display:none"></div>
  <div id="modal-root"><div class="overlay" data-action="close-modal"></div><div class="sheet" id="sheet-body"></div></div>
  <div id="save-error" style="display:none;position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
    background:var(--rose);color:#fff;padding:9px 18px;border-radius:12px;font-size:12px;font-weight:700;
    z-index:40;max-width:88%;text-align:center;box-shadow:var(--shadow);">تعذر حفظ آخر تعديل، تحقق من الاتصال</div>
</div>

<script>
const LOW_STOCK = 5;
const CURRENCY = "د.ع";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const fmt = (n) => Math.round(n||0).toLocaleString("en-US");
const todayISO = () => new Date().toISOString().slice(0,10);
const esc = (s) => (s==null?"":String(s)).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const nowLocalInput = (iso) => {
  const d = iso ? new Date(iso) : new Date();
  const pad = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
};
const localInputToISO = (val) => val ? new Date(val).toISOString() : new Date().toISOString();

/* ---------------- SUPABASE / AUTH ---------------- */
// Only the publishable (anon) key belongs here. Never put a secret/service-role key in client code.
const SUPABASE_URL = "https://gufvmajnhcgonpirtnrt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_E67n8tWgQG6_CEjQkb1c7A_Cg16Az8K";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let session = null;
let authMode = "login"; // "login" | "signup"
let authError = "";
let authNotice = "";

async function initAuth(){
  const { data } = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((_event, s)=>{
    const wasSignedIn = !!session;
    session = s;
    if(session && !wasSignedIn){ loadData(); }
    else if(!session){
      state = { data:{ products:[], customers:[], sales:[], payments:[] }, tab:"home", ready:false };
      renderAuth();
    }
  });
  if(session) loadData(); else renderAuth();
}

function renderAuth(){
  document.getElementById("bottomnav").style.display = "none";
  document.getElementById("content").innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <h1 style="text-align:center;margin-bottom:4px;">الديون والمخزون</h1>
        <div style="text-align:center;color:var(--muted);font-size:12.5px;margin-bottom:20px;">
          ${authMode==="login" ? "سجّل الدخول لمتابعة عملك" : "أنشئ حسابًا جديدًا"}
        </div>
        ${authError ? `<div class="notice">${esc(authError)}</div>` : ""}
        ${authNotice ? `<div class="notice success">${esc(authNotice)}</div>` : ""}
        <label class="field"><div class="field-label">البريد الإلكتروني</div><input class="in" id="auth-email" type="email" inputmode="email" autocomplete="email"></label>
        <label class="field"><div class="field-label">كلمة المرور</div><input class="in" id="auth-pass" type="password" autocomplete="${authMode==='login'?'current-password':'new-password'}"></label>
        <button class="btn btn-primary btn-block" id="auth-submit">${authMode==="login" ? "تسجيل الدخول" : "إنشاء حساب"}</button>
        <button class="link-btn" id="auth-toggle" style="display:block;margin:14px auto 0;">
          ${authMode==="login" ? "ليس لديك حساب؟ أنشئ حسابًا" : "لديك حساب؟ سجّل الدخول"}
        </button>
      </div>
    </div>
  `;
  document.getElementById("auth-toggle").onclick = ()=>{
    authMode = authMode==="login" ? "signup" : "login";
    authError = ""; authNotice = "";
    renderAuth();
  };
  document.getElementById("auth-submit").onclick = submitAuth;
  const passField = document.getElementById("auth-pass");
  passField.onkeydown = (e)=>{ if(e.key==="Enter") submitAuth(); };
}

async function submitAuth(){
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-pass").value;
  authError = ""; authNotice = "";
  if(!email || !password){ authError = "الرجاء إدخال البريد الإلكتروني وكلمة المرور"; renderAuth(); return; }
  if(password.length < 6){ authError = "كلمة المرور يجب ألا تقل عن 6 أحرف"; renderAuth(); return; }
  const btn = document.getElementById("auth-submit");
  btn.disabled = true; btn.textContent = "...";
  if(authMode==="login"){
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ authError = error.message; renderAuth(); return; }
  } else {
    const { data, error } = await sb.auth.signUp({ email, password });
    if(error){ authError = error.message; renderAuth(); return; }
    if(!data.session){
      authMode = "login";
      authNotice = "تم إنشاء الحساب! تحقق من بريدك الإلكتروني لتفعيل الحساب ثم سجّل الدخول.";
      renderAuth();
      return;
    }
  }
}

async function signOut(){
  await sb.auth.signOut();
}

function isSameDay(dateStr, ref){ return dateStr.slice(0,10) === ref.slice(0,10); }
function isWithinDays(dateStr, days){
  const d = new Date(dateStr).getTime(), now = Date.now();
  return now - d <= days*24*60*60*1000 && d <= now;
}
function isSameMonth(dateStr, ref){
  const a = new Date(dateStr), b = new Date(ref);
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth();
}
function fmtDate(dateStr){ return new Date(dateStr).toLocaleDateString("en-GB"); }
function fmtDateTime(dateStr){
  const d = new Date(dateStr);
  return d.toLocaleDateString("en-GB") + " " + d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}

let state = { data: { products: [], customers: [], sales: [], payments: [] }, tab: "home", ready: false };
let ui = {
  productQuery: "", confirmDeleteId: null,
  cart: [], saleCustomerId: "", salePaid: "", saleDiscount: "0", saleDate: nowLocalInput(),
  saleDone: false, editingSaleId: null,
  reportPeriod: "day",
  payAmount: "",
  customerQuery: "", customerSort: "debt",
  invoiceQuery: "", confirmDeleteInvoiceId: null,
};
let charts = { trend: null, top: null };

/* ---------------- DATA LAYER: full relational sync with Supabase ---------------- */
// Each row-changing action in the app calls persist(nextFullState). We diff the
// previous vs next state per-collection (by object identity, which the app's own
// update code already preserves for untouched rows) and push only what changed.

function diffById(prevArr, nextArr){
  const prevMap = new Map((prevArr||[]).map(x=>[x.id, x]));
  const nextMap = new Map((nextArr||[]).map(x=>[x.id, x]));
  const removed = [...prevMap.keys()].filter(id=>!nextMap.has(id));
  const changed = (nextArr||[]).filter(x=> prevMap.get(x.id) !== x);
  return { removed, changed };
}

function flashSaveError(){
  const el = document.getElementById("save-error");
  if(!el) return;
  el.style.display = "block";
  clearTimeout(flashSaveError._t);
  flashSaveError._t = setTimeout(()=>{ el.style.display = "none"; }, 3500);
}

async function syncProducts(prevArr, nextArr, uid_){
  const { removed, changed } = diffById(prevArr, nextArr);
  if(removed.length){
    const { error } = await sb.from("products").delete().in("id", removed);
    if(error) throw error;
  }
  if(changed.length){
    const rows = changed.map(p=>({
      id: p.id, user_id: uid_, name: p.name, code: p.code || "",
      buy_price: Number(p.buyPrice)||0, sell_price: Number(p.sellPrice)||0,
      qty: Number(p.qty)||0, image_url: p.imageUrl || "",
    }));
    const { error } = await sb.from("products").upsert(rows);
    if(error) throw error;
  }
}

async function syncCustomers(prevArr, nextArr, uid_){
  const { removed, changed } = diffById(prevArr, nextArr);
  if(removed.length){
    const { error } = await sb.from("customers").delete().in("id", removed);
    if(error) throw error;
  }
  if(changed.length){
    const rows = changed.map(c=>({
      id: c.id, user_id: uid_, name: c.name, phone: c.phone || "",
      location: c.location || "", note: c.note || "",
    }));
    const { error } = await sb.from("customers").upsert(rows);
    if(error) throw error;
  }
}

async function syncPayments(prevArr, nextArr, uid_){
  const { removed, changed } = diffById(prevArr, nextArr);
  if(removed.length){
    const { error } = await sb.from("payments").delete().in("id", removed);
    if(error) throw error;
  }
  if(changed.length){
    const rows = changed.map(p=>({
      id: p.id, user_id: uid_, customer_id: p.customerId || null, sale_id: p.saleId || null,
      amount: Number(p.amount)||0, date: p.date, note: p.note || "",
    }));
    const { error } = await sb.from("payments").upsert(rows);
    if(error) throw error;
  }
}

async function syncSales(prevArr, nextArr, uid_){
  const { removed, changed } = diffById(prevArr, nextArr);
  if(removed.length){
    // sale_items rows cascade-delete automatically via FK when the sale is removed
    const { error } = await sb.from("sales").delete().in("id", removed);
    if(error) throw error;
  }
  if(changed.length){
    const rows = changed.map(s=>({
      id: s.id, user_id: uid_, customer_id: s.customerId || null, date: s.date,
      total: Number(s.total)||0, discount: Number(s.discount)||0, paid: Number(s.paid)||0,
    }));
    const { error: saleErr } = await sb.from("sales").upsert(rows);
    if(saleErr) throw saleErr;

    // re-sync items only for the sales whose contents actually changed
    const saleIds = changed.map(s=>s.id);
    const { error: delErr } = await sb.from("sale_items").delete().in("sale_id", saleIds);
    if(delErr) throw delErr;

    const itemRows = [];
    changed.forEach(s=>{
      (s.items||[]).forEach(it=>{
        itemRows.push({
          id: uid(), user_id: uid_, sale_id: s.id, product_id: it.productId || null,
          name: it.name, qty: Number(it.qty)||0,
          sell_price: Number(it.sellPrice)||0, buy_price: Number(it.buyPrice)||0,
        });
      });
    });
    if(itemRows.length){
      const { error: itemErr } = await sb.from("sale_items").insert(itemRows);
      if(itemErr) throw itemErr;
    }
  }
}

async function loadData(){
  try{
    const uid_ = session.user.id;
    const [productsRes, customersRes, salesRes, paymentsRes, itemsRes] = await Promise.all([
      sb.from("products").select("*").eq("user_id", uid_).order("name"),
      sb.from("customers").select("*").eq("user_id", uid_).order("name"),
      sb.from("sales").select("*").eq("user_id", uid_).order("date"),
      sb.from("payments").select("*").eq("user_id", uid_).order("date"),
      sb.from("sale_items").select("*").eq("user_id", uid_),
    ]);
    [productsRes, customersRes, salesRes, paymentsRes, itemsRes].forEach(r=>{ if(r.error) throw r.error; });

    const itemsBySale = {};
    (itemsRes.data||[]).forEach(it=>{
      (itemsBySale[it.sale_id] ||= []).push({
        productId: it.product_id, name: it.name, qty: Number(it.qty),
        sellPrice: Number(it.sell_price), buyPrice: Number(it.buy_price),
      });
    });

    state.data = {
      products: (productsRes.data||[]).map(p=>({
        id: p.id, name: p.name, code: p.code||"", buyPrice: Number(p.buy_price),
        sellPrice: Number(p.sell_price), qty: Number(p.qty), imageUrl: p.image_url||"",
      })),
      customers: (customersRes.data||[]).map(c=>({
        id: c.id, name: c.name, phone: c.phone||"", location: c.location||"", note: c.note||"",
      })),
      sales: (salesRes.data||[]).map(s=>({
        id: s.id, date: s.date, customerId: s.customer_id, total: Number(s.total),
        discount: Number(s.discount), paid: Number(s.paid), items: itemsBySale[s.id]||[],
      })),
      payments: (paymentsRes.data||[]).map(p=>({
        id: p.id, customerId: p.customer_id, saleId: p.sale_id, amount: Number(p.amount),
        date: p.date, note: p.note||"",
      })),
    };
  }catch(e){
    console.error("تعذر تحميل البيانات", e);
    state.data = { products:[], customers:[], sales:[], payments:[] };
    flashSaveError();
  }
  state.ready = true;
  render();
}

async function persist(next){
  const prev = state.data;
  state.data = next;
  render(); // optimistic: update UI immediately, sync in the background
  const uid_ = session && session.user && session.user.id;
  if(!uid_) return;
  try{
    const jobs = [];
    if(next.products  !== prev.products)  jobs.push(syncProducts(prev.products, next.products, uid_));
    if(next.customers !== prev.customers) jobs.push(syncCustomers(prev.customers, next.customers, uid_));
    if(next.sales     !== prev.sales)     jobs.push(syncSales(prev.sales, next.sales, uid_));
    if(next.payments  !== prev.payments)  jobs.push(syncPayments(prev.payments, next.payments, uid_));
    await Promise.all(jobs);
  }catch(e){
    console.error("تعذر الحفظ في قاعدة البيانات", e);
    flashSaveError();
  }
}

function debtByCustomer(){
  const map = {};
  state.data.customers.forEach(c=>{
    const charged = state.data.sales.filter(s=>s.customerId===c.id).reduce((a,s)=>a+s.total,0);
    const paid = state.data.payments.filter(p=>p.customerId===c.id).reduce((a,p)=>a+p.amount,0);
    const pays = state.data.payments.filter(p=>p.customerId===c.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    map[c.id] = { charged, paid, remaining: charged-paid, lastPay: pays[0]?pays[0].date:null };
  });
  return map;
}

/* ---------------- SALE ---------------- */
function saleProductMap(){ return Object.fromEntries(state.data.products.map(p=>[p.id,p])); }

// available stock for a product while editing an existing sale (old reserved qty returns to pool)
function availableQty(productId){
  const p = saleProductMap()[productId];
  if(!p) return 0;
  let base = p.qty;
  if(ui.editingSaleId){
    const oldSale = state.data.sales.find(s=>s.id===ui.editingSaleId);
    const oldItem = oldSale && oldSale.items.find(it=>it.productId===productId);
    if(oldItem) base += oldItem.qty;
  }
  return base;
}

function changeCartQty(id, delta){
  const max = availableQty(id);
  ui.cart = ui.cart.map(it=>it.productId===id?{...it, qty:Math.min(it.qty+delta, Math.max(max, it.qty+delta))}:it).filter(it=>it.qty>0);
  renderSale();
}

function confirmSale(){
  const pm = saleProductMap();
  const rawTotal = ui.cart.reduce((a,it)=>a+(pm[it.productId]?.sellPrice||0)*it.qty,0);
  const discount = Math.max(Number(ui.saleDiscount)||0,0);
  const total = Math.max(rawTotal - discount, 0);
  const paidNum = Math.min(Number(ui.salePaid)||0, total);
  const isoDate = localInputToISO(ui.saleDate);
  const items = ui.cart.map(it=>{
    const p = pm[it.productId];
    return {productId:p.id, name:p.name, qty:it.qty, sellPrice:p.sellPrice, buyPrice:p.buyPrice};
  });

  if(ui.editingSaleId){
    const oldSale = state.data.sales.find(s=>s.id===ui.editingSaleId);
    const products = state.data.products.map(p=>{
      const oldQty = (oldSale.items.find(it=>it.productId===p.id)||{}).qty || 0;
      const newQty = (ui.cart.find(it=>it.productId===p.id)||{}).qty || 0;
      const diff = oldQty - newQty;
      return diff !== 0 ? {...p, qty: p.qty + diff} : p;
    });
    const payments = state.data.payments.filter(pay=>pay.saleId !== ui.editingSaleId);
    if(paidNum>0) payments.push({id:uid(), customerId: ui.saleCustomerId||null, amount:paidNum, date:isoDate, note:"دفعة عند البيع", saleId:ui.editingSaleId});
    const updatedSale = {...oldSale, date:isoDate, customerId: ui.saleCustomerId||null, items, total, discount, paid:paidNum};
    const sales = state.data.sales.map(s=>s.id===ui.editingSaleId?updatedSale:s);
    resetSaleForm();
    persist({...state.data, products, sales, payments});
    state.tab = "reports";
  } else {
    const sale = { id:uid(), date:isoDate, customerId: ui.saleCustomerId||null, items, total, discount, paid: paidNum };
    const products = state.data.products.map(p=>{
      const inCart = ui.cart.find(it=>it.productId===p.id);
      return inCart ? {...p, qty:p.qty-inCart.qty} : p;
    });
    const payments = [...state.data.payments];
    if(paidNum>0) payments.push({id:uid(), customerId: ui.saleCustomerId||null, amount:paidNum, date:isoDate, note:"دفعة عند البيع", saleId:sale.id});
    resetSaleForm();
    ui.saleDone = true;
    persist({...state.data, products, sales:[...state.data.sales, sale], payments});
    setTimeout(()=>{ ui.saleDone=false; if(state.tab==="sale") render(); }, 1600);
  }
}

/* ---------------- CUSTOMERS ---------------- */
function renderCustomers(){
  const dbc = debtByCustomer();
  let list = state.data.customers.filter(c=>c.name.includes(ui.customerQuery) || (c.phone||"").includes(ui.customerQuery));
  if(ui.customerSort==="debt") list.sort((a,b)=>(dbc[b.id]?.remaining||0)-(dbc[a.id]?.remaining||0));
  else list.sort((a,b)=>a.name.localeCompare(b.name,"ar"));

  document.getElementById("content").innerHTML = `
    <div class="topbar"><h1>العملاء والديون</h1><button class="btn btn-primary" id="add-customer">+ عميل</button></div>
    <div class="search"><span class="ic">🔍</span><input id="customer-search" placeholder="بحث بالاسم أو رقم الهاتف" value="${esc(ui.customerQuery)}"></div>
    <div class="sort-row">
      <button class="sort-chip ${ui.customerSort==='debt'?'active':''}" data-sort="debt">الأكثر دينًا</button>
      <button class="sort-chip ${ui.customerSort==='name'?'active':''}" data-sort="name">الاسم أبجديًا</button>
    </div>
    ${list.length===0 ? '<div class="empty">لا يوجد عملاء مطابقين.</div>' :
      list.map(c=>{
        const d = dbc[c.id]||{remaining:0,lastPay:null};
        return `<button class="customer-row" data-open-customer="${c.id}">
          <div class="left"><b>${esc(c.name)}</b><div class="phone">${c.phone?('📞 '+esc(c.phone)):''}</div></div>
          <div class="right"><div class="amt" style="color:${d.remaining>0?'var(--rose)':'var(--emerald)'}">${fmt(Math.max(d.remaining,0))} ${CURRENCY}</div>
          <div class="last">${d.lastPay?('آخر دفعة '+fmtDate(d.lastPay)):'لا دفعات'}</div></div>
        </button>`;
      }).join("")}
  `;
  document.getElementById("add-customer").onclick = openCustomerForm;
  document.getElementById("customer-search").oninput = (e)=>{ ui.customerQuery=e.target.value; renderCustomers(); };
  document.querySelectorAll("[data-sort]").forEach(b=>b.onclick=()=>{ ui.customerSort=b.dataset.sort; renderCustomers(); });
  document.querySelectorAll("[data-open-customer]").forEach(b=>b.onclick=()=>openCustomerDetail(b.dataset.openCustomer));
}

function openCustomerForm(){
  openSheet("إضافة عميل", `
    <label class="field"><div class="field-label">الاسم</div><input class="in" id="c-name"></label>
    <label class="field"><div class="field-label">رقم الهاتف</div><input class="in" id="c-phone" inputmode="tel"></label>
    <label class="field"><div class="field-label">الموقع</div><input class="in" id="c-location"></label>
    <label class="field"><div class="field-label">ملاحظة (اختياري)</div><input class="in" id="c-note"></label>
    <button class="btn btn-primary btn-block" id="save-customer">حفظ</button>
  `);
  document.getElementById("c-name").focus();
  document.getElementById("save-customer").onclick = ()=>{
    const name = document.getElementById("c-name").value.trim();
    if(!name) return;
    const clean = { id:uid(), name, phone:document.getElementById("c-phone").value.trim(),
      location:document.getElementById("c-location").value.trim(), note:document.getElementById("c-note").value.trim() };
    closeModal();
    persist({...state.data, customers:[...state.data.customers, clean]});
  };
}

function openCustomerDetail(id){
  const c = state.data.customers.find(x=>x.id===id);
  const dbc = debtByCustomer();
  const d = dbc[id] || {charged:0,paid:0,remaining:0};
  const history = [
    ...state.data.payments.filter(p=>p.customerId===id).map(p=>({...p,isSale:false})),
    ...state.data.sales.filter(s=>s.customerId===id).map(s=>({...s,isSale:true})),
  ].sort((a,b)=>new Date(b.date)-new Date(a.date));

  openSheet(c.name, `
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:10px;">
      ${c.phone?`<div>📞 ${esc(c.phone)}</div>`:""}
      ${c.location?`<div>📍 ${esc(c.location)}</div>`:""}
      ${c.note?`<div style="color:#B9BCB4;margin-top:4px;">${esc(c.note)}</div>`:""}
    </div>
    <div class="summary-card">
      <div class="kv"><span class="k">المبلغ الكلي</span><span class="v">${fmt(d.charged)} ${CURRENCY}</span></div>
      <div class="kv"><span class="k">المدفوع</span><span class="v">${fmt(d.paid)} ${CURRENCY}</span></div>
      <div class="kv"><span class="k">المتبقي</span><span class="v" style="color:var(--rose)">${fmt(Math.max(d.remaining,0))} ${CURRENCY}</span></div>
    </div>
    ${d.remaining>0 ? `
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <input class="in" id="pay-amount" type="number" inputmode="decimal" placeholder="مبلغ الدفعة" style="flex:1">
        <button class="btn btn-primary" id="record-payment">تسجيل دفعة</button>
      </div>` : ""}
    <div class="section-title" style="margin-top:0">السجل</div>
    <div>
    ${history.length===0 ? '<div class="empty">لا يوجد سجل بعد.</div>' :
      history.map(h=>`<div class="history-row" ${h.isSale?`data-view-sale="${h.id}"`:""}>
        <span class="date">🕒 ${fmtDate(h.date)}</span>
        ${h.isSale ? `<span>فاتورة بقيمة ${fmt(h.total)} ${CURRENCY} ›</span>` : `<span class="amt pay">دفعة ${fmt(h.amount)} ${CURRENCY}</span>`}
      </div>`).join("")}
    </div>
  `);
  if(d.remaining>0){
    document.getElementById("record-payment").onclick = ()=>{
      const amt = Number(document.getElementById("pay-amount").value);
      if(!amt || amt<=0) return;
      const payments = [...state.data.payments, {id:uid(), customerId:id, amount:amt, date:new Date().toISOString(), note:"دفعة يدوية"}];
      closeModal();
      persist({...state.data, payments});
    };
  }
  document.querySelectorAll("[data-view-sale]").forEach(row=>row.onclick=()=>openInvoiceDetail(row.dataset.viewSale));
}

/* ---------------- INVOICES ---------------- */
function openInvoiceList(){ renderInvoiceListSheet(""); }
function renderInvoiceListSheet(query){
  ui.invoiceQuery = query;
  const cmap = Object.fromEntries(state.data.customers.map(c=>[c.id,c.name]));
  const list = [...state.data.sales]
    .filter(s=>{
      const cname = s.customerId ? (cmap[s.customerId]||"") : "نقدي";
      return cname.includes(query);
    })
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  openSheet("كل الفواتير", `
    <div class="search"><span class="ic">🔍</span><input class="in" id="invoice-search" placeholder="بحث باسم العميل..." value="${esc(query)}" style="padding-right:38px"></div>
    ${list.length===0 ? '<div class="empty">لا توجد فواتير بعد.</div>' :
      list.map(s=>`<div class="history-row" data-view-sale="${s.id}">
        <span class="date">🕒 ${fmtDateTime(s.date)} · ${s.customerId?esc(cmap[s.customerId]||"—"):"نقدي"}</span>
        <span>${fmt(s.total)} ${CURRENCY} ${s.total-s.paid>0?`<span style="color:var(--rose)">(متبقي ${fmt(s.total-s.paid)})</span>`:""} ›</span>
      </div>`).join("")}
  `);
  document.getElementById("invoice-search").oninput = (e)=>renderInvoiceListSheet(e.target.value);
  document.querySelectorAll("[data-view-sale]").forEach(row=>row.onclick=()=>openInvoiceDetail(row.dataset.viewSale));
}

function openInvoiceDetail(saleId){
  const s = state.data.sales.find(x=>x.id===saleId);
  if(!s) return;
  const cmap = Object.fromEntries(state.data.customers.map(c=>[c.id,c.name]));
  const remaining = s.total - s.paid;
  openSheet("تفاصيل الفاتورة", `
    <button class="back-x" id="back-to-list" style="margin-bottom:12px">‹ رجوع لكل الفواتير</button>
    <div class="summary-card">
      <div class="kv"><span class="k">التاريخ</span><span class="v">${fmtDateTime(s.date)}</span></div>
      <div class="kv"><span class="k">العميل</span><span class="v">${s.customerId?esc(cmap[s.customerId]||"—"):"نقدي"}</span></div>
    </div>
    <div class="section-title" style="margin-top:0">المنتجات</div>
    ${s.items.map(it=>`<div class="history-row"><span>${esc(it.name)} × ${it.qty}</span><span>${fmt(it.sellPrice*it.qty)} ${CURRENCY}</span></div>`).join("")}
    <div class="summary-card" style="margin-top:12px">
      ${s.discount>0?`<div class="kv"><span class="k">الخصم</span><span class="v">- ${fmt(s.discount)} ${CURRENCY}</span></div>`:""}
      <div class="kv"><span class="k">الإجمالي</span><span class="v">${fmt(s.total)} ${CURRENCY}</span></div>
      <div class="kv"><span class="k">المدفوع</span><span class="v">${fmt(s.paid)} ${CURRENCY}</span></div>
      <div class="kv"><span class="k">المتبقي</span><span class="v" style="color:${remaining>0?'var(--rose)':'var(--emerald)'}">${fmt(Math.max(remaining,0))} ${CURRENCY}</span></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" style="flex:1" id="edit-invoice">تعديل الفاتورة</button>
      ${ui.confirmDeleteInvoiceId===saleId
        ? `<button class="btn btn-danger" style="flex:1" id="confirm-del-invoice">اضغط للتأكيد</button>`
        : `<button class="btn btn-ghost" style="flex:1" id="ask-del-invoice">حذف الفاتورة</button>`}
    </div>
  `);
  document.getElementById("back-to-list").onclick = ()=>renderInvoiceListSheet(ui.invoiceQuery);
  document.getElementById("edit-invoice").onclick = ()=>editInvoice(saleId);
  const askBtn = document.getElementById("ask-del-invoice");
  if(askBtn) askBtn.onclick = ()=>{ ui.confirmDeleteInvoiceId=saleId; openInvoiceDetail(saleId); };
  const confirmBtn = document.getElementById("confirm-del-invoice");
  if(confirmBtn) confirmBtn.onclick = ()=>{
    const products = state.data.products.map(p=>{
      const item = s.items.find(it=>it.productId===p.id);
      return item ? {...p, qty:p.qty+item.qty} : p;
    });
    const sales = state.data.sales.filter(x=>x.id!==saleId);
    const payments = state.data.payments.filter(p=>p.saleId!==saleId);
    ui.confirmDeleteInvoiceId = null;
    closeModal();
    persist({...state.data, products, sales, payments});
  };
}

function editInvoice(saleId){
  const s = state.data.sales.find(x=>x.id===saleId);
  if(!s) return;
  ui.editingSaleId = saleId;
  ui.cart = s.items.map(it=>({productId:it.productId, qty:it.qty}));
  ui.saleCustomerId = s.customerId || "";
  ui.salePaid = String(s.paid);
  ui.saleDiscount = String(s.discount||0);
  ui.saleDate = nowLocalInput(s.date);
  closeModal();
  state.tab = "sale";
  render();
}

/* ---------------- REPORTS ---------------- */
function renderReports(){
  const period = ui.reportPeriod;
  const inPeriod = (dateStr)=>{
    if(period==="day") return isSameDay(dateStr, todayISO());
    if(period==="week") return isWithinDays(dateStr, 7);
    return isSameMonth(dateStr, todayISO());
  };
  const sales = state.data.sales.filter(s=>inPeriod(s.date));
  const totalSales = sales.reduce((a,s)=>a+s.total,0);
  const totalProfit = sales.reduce((a,s)=>a+s.items.reduce((x,it)=>x+(it.sellPrice-it.buyPrice)*it.qty,0)-(s.discount||0),0);
  const productCount = {};
  sales.forEach(s=>s.items.forEach(it=>{ productCount[it.name]=(productCount[it.name]||0)+it.qty; }));
  const sortedProducts = Object.entries(productCount).sort((a,b)=>b[1]-a[1]);
  const topProduct = sortedProducts[0] ? `${sortedProducts[0][0]} (${sortedProducts[0][1]})` : "—";

  const dbc = debtByCustomer();
  const cmap = Object.fromEntries(state.data.customers.map(c=>[c.id,c.name]));
  const topDebtorEntry = Object.entries(dbc).sort((a,b)=>b[1].remaining-a[1].remaining)[0];
  const topDebtor = (topDebtorEntry && topDebtorEntry[1].remaining>0) ? cmap[topDebtorEntry[0]] : "لا يوجد";
  const totalDebt = Object.values(dbc).reduce((a,x)=>a+Math.max(x.remaining,0),0);

  // last 7 days trend data
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    const total = state.data.sales.filter(s=>s.date.slice(0,10)===iso).reduce((a,s)=>a+s.total,0);
    days.push({ label: d.toLocaleDateString("ar-EG",{weekday:"short"}), total });
  }
  const topProductsChartData = sortedProducts.slice(0,5);

  document.getElementById("content").innerHTML = `
    <div class="topbar"><h1>التقارير</h1><button class="link-btn" id="open-invoices">كل الفواتير ›</button></div>
    <div class="period-tabs">
      <button data-period="day" class="${period==='day'?'active':''}">اليوم</button>
      <button data-period="week" class="${period==='week'?'active':''}">هذا الأسبوع</button>
      <button data-period="month" class="${period==='month'?'active':''}">هذا الشهر</button>
    </div>
    <div class="grid2" style="margin-bottom:14px">
      <div class="stat-box"><div class="val">${fmt(totalSales)} ${CURRENCY}</div><div class="lbl">المبيعات</div></div>
      <div class="stat-box"><div class="val">${fmt(totalProfit)} ${CURRENCY}</div><div class="lbl">الربح</div></div>
      <div class="stat-box"><div class="val small">${esc(topProduct)}</div><div class="lbl">أكثر منتج مبيعًا</div></div>
      <div class="stat-box"><div class="val small">${esc(topDebtor)}</div><div class="lbl">أكثر عميل عليه دين</div></div>
    </div>
    <div class="chart-card"><div class="ct">اتجاه المبيعات آخر 7 أيام</div><canvas id="trend-chart" height="160"></canvas></div>
    <div class="chart-card"><div class="ct">أكثر المنتجات مبيعًا (${period==='day'?'اليوم':period==='week'?'هذا الأسبوع':'هذا الشهر'})</div>
      ${topProductsChartData.length===0 ? '<div class="empty">لا توجد مبيعات في هذه الفترة بعد.</div>' : '<canvas id="top-products-chart" height="180"></canvas>'}
    </div>
    <div class="summary-card">
      <div class="kv"><span class="k">إجمالي الديون المستحقة (كل الفترات)</span><span class="v" style="color:var(--rose)">${fmt(totalDebt)} ${CURRENCY}</span></div>
    </div>
  `;
  document.getElementById("open-invoices").onclick = openInvoiceList;
  document.querySelectorAll("[data-period]").forEach(b=>b.onclick=()=>{ ui.reportPeriod=b.dataset.period; renderReports(); });

  if(charts.trend) charts.trend.destroy();
  const trendCtx = document.getElementById("trend-chart");
  charts.trend = new Chart(trendCtx, {
    type: "bar",
    data: { labels: days.map(d=>d.label), datasets: [{ data: days.map(d=>d.total), backgroundColor: "#0E6B5C", borderRadius: 6, maxBarThickness: 28 }] },
    options: { plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true, grid:{color:"#EAE7E0"} }, x:{ grid:{display:false} } } }
  });

  if(charts.top) charts.top.destroy();
  if(topProductsChartData.length>0){
    const topCtx = document.getElementById("top-products-chart");
    charts.top = new Chart(topCtx, {
      type: "bar",
      data: { labels: topProductsChartData.map(p=>p[0]), datasets: [{ data: topProductsChartData.map(p=>p[1]), backgroundColor: "#0E9A6E", borderRadius: 6, maxBarThickness: 22 }] },
      options: { indexAxis: "y", plugins:{legend:{display:false}}, scales:{ x:{ beginAtZero:true, grid:{color:"#EAE7E0"} }, y:{ grid:{display:false} } } }
    });
  }
}

/* ---------------- modal + nav plumbing ---------------- */
function openSheet(title, innerHtml){
  document.getElementById("sheet-body").innerHTML = `
    <div class="sheet-head"><h2>${esc(title)}</h2><button class="close-x" data-action="close-modal">✕</button></div>
    ${innerHtml}
  `;
  document.getElementById("modal-root").classList.add("open");
}
function closeModal(){ document.getElementById("modal-root").classList.remove("open"); }

document.getElementById("modal-root").addEventListener("click", (e)=>{
  if(e.target.dataset.action==="close-modal") closeModal();
});
document.getElementById("bottomnav").addEventListener("click", (e)=>{
  const btn = e.target.closest("[data-goto]");
  if(btn){ state.tab = btn.dataset.goto; render(); }
});
document.getElementById("content").addEventListener("click", (e)=>{
  const btn = e.target.closest("[data-goto]");
  if(btn){ state.tab = btn.dataset.goto; render(); }
});

initAuth();
</script>
</body>
</html>
